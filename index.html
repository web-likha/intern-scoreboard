<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebLikha Intern Score Cards</title>
<link href="https://cdn.prod.website-files.com/6829ba317137e68337ab4113/6841dcfbd9aafe194e4c1db1_weblikha_Favicon.png" rel="shortcut icon" type="image/x-icon"/>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root {
    --pink: #FF6B9D; --yellow: #FFD93D; --mint: #6BCB77;
    --blue: #4D96FF; --purple: #C77DFF; --orange: #FF9A3C;
    --bg: #FFF9F0;   --dark: #1a1a2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(circle,#FF6B9D33 2px,transparent 2px),
      radial-gradient(circle,#FFD93D33 2px,transparent 2px),
      radial-gradient(circle,#4D96FF33 2px,transparent 2px),
      radial-gradient(circle,#6BCB7733 2px,transparent 2px);
    background-size:60px 60px,45px 45px,80px 80px,55px 55px;
    background-position:0 0,30px 20px,15px 40px,45px 10px;
  }
  .wrapper { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:40px 20px 60px; }

  /* HEADER */
  header { text-align:center; margin-bottom:50px; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .badge {
    display:inline-block; background:#2d405b; color:var(--yellow);
    font-family:'Bangers',cursive; font-size:13px; letter-spacing:3px;
    padding:6px 16px; border-radius:20px; text-transform:uppercase;
  }
  .logo-wrap {
    display: block;
    background: #2d405b;
    border-radius: 16px;
    padding: 20px 40px;
    border: 3px solid #000;
    box-shadow: 5px 5px 0 var(--yellow);
    margin: 0 auto 12px;
    width: fit-content;
  }
  .logo-img { height: 64px; width: auto; display: block; }
  .subtitle { font-size:16px; color:#888; font-weight:700; margin-top:8px; letter-spacing:1px; text-transform:uppercase; }

  /* SECTION TITLE */
  .section-title {
    font-family:'Bangers',cursive; font-size:32px; letter-spacing:2px; color:var(--dark);
    margin-bottom:20px; display:flex; align-items:center; gap:10px;
  }
  .section-title .pill { display:inline-block; width:14px; height:14px; border-radius:50%; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:40px; }
  .stat-box {
    background:white; border-radius:18px; border:3px solid var(--dark);
    box-shadow:4px 4px 0 var(--dark); padding:20px 16px; text-align:center;
  }
  .stat-icon { font-size:28px; margin-bottom:6px; }
  .stat-val { font-family:'Bangers',cursive; font-size:36px; color:var(--dark); line-height:1; }
  .stat-label { font-size:11px; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

  /* LEADERBOARD */
  .leaderboard {
    background:white; border-radius:24px; border:3px solid var(--dark);
    box-shadow:6px 6px 0 var(--dark); padding:30px; margin-bottom:40px;
  }
  .lb-row {
    display:flex; align-items:center; padding:14px 16px; border-radius:16px;
    margin-bottom:10px; gap:16px; border:2.5px solid transparent; cursor:default;
  }
  .lb-row:nth-child(1){background:#FFF3D0;border-color:#FFD93D;}
  .lb-row:nth-child(2){background:#F0F4FF;border-color:#4D96FF;}
  .lb-row:nth-child(3){background:#FFF0F5;border-color:#FF6B9D;}
  .lb-row:nth-child(n+4){background:#F7F7F7;border-color:#ddd;}
  .rank { font-family:'Bangers',cursive; font-size:28px; width:42px; text-align:center; flex-shrink:0; }
  .rank-1{color:#F5A623;} .rank-2{color:#7B8FA1;} .rank-3{color:#C07B4F;} .rank-other{color:#aaa;font-size:22px;}
  .avatar {
    width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Bangers',cursive; font-size:20px; color:white; border:2.5px solid var(--dark); flex-shrink:0;
  }
  .intern-name { font-size:18px; font-weight:900; color:var(--dark); flex:1; }
  .week-dots { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .dot {
    width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:900; border:2px solid var(--dark); flex-shrink:0;
  }
  .dot-10{background:#6BCB77;color:white;} .dot-9{background:#4D96FF;color:white;}
  .dot-8{background:#FFD93D;color:var(--dark);} .dot-7{background:#FF9A3C;color:white;}
  .dot-6{background:#FF6B9D;color:white;} .dot-empty{background:#eee;color:#ccc;border-color:#ddd;}
  .total-badge {
    font-family:'Bangers',cursive; font-size:22px; background:var(--dark); color:var(--yellow);
    padding:4px 14px; border-radius:20px; flex-shrink:0;
  }

  /* CARDS */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; margin-bottom:40px; }
  .card {
    background:white; border-radius:20px; border:3px solid var(--dark);
    padding:22px 18px; box-shadow:5px 5px 0 var(--dark); position:relative; overflow:hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:6px; }
  .card:nth-child(1)::before{background:var(--pink);}  .card:nth-child(2)::before{background:var(--blue);}
  .card:nth-child(3)::before{background:var(--mint);}  .card:nth-child(4)::before{background:var(--yellow);}
  .card:nth-child(5)::before{background:var(--purple);}.card:nth-child(6)::before{background:var(--orange);}
  .card:nth-child(7)::before{background:var(--pink);}  .card:nth-child(8)::before{background:var(--blue);}
  .card:nth-child(9)::before{background:var(--mint);}
  .card-avatar {
    width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Bangers',cursive; font-size:24px; color:white; border:2.5px solid var(--dark); margin-bottom:12px;
  }
  .card-name { font-size:20px; font-weight:900; color:var(--dark); margin-bottom:4px; }
  .card-avg { font-size:12px; color:#888; font-weight:700; margin-bottom:14px; }
  .card-avg span { font-size:14px; font-weight:900; color:var(--dark); }
  .card-scores { display:flex; flex-direction:column; gap:7px; }
  .score-row { display:flex; align-items:center; gap:8px; }
  .score-label { color:#aaa; width:95px; flex-shrink:0; font-size:11px; font-weight:900; }
  .score-bar-wrap { flex:1; height:10px; background:#f0f0f0; border-radius:10px; overflow:hidden; border:1.5px solid #ddd; }
  .score-bar { height:100%; border-radius:10px; width:0%; }
  .score-val { font-size:12px; font-weight:900; color:var(--dark); width:16px; text-align:right; }
  .score-breakdown { display:flex; gap:6px; padding:3px 0 8px 0; }
  .judge-chip { font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; border:2px solid var(--dark); }
  .judge-chip.kel { background:#C77DFF; color:white; }
  .judge-chip.matt { background:#4D96FF; color:white; }

  /* CHART */
  .chart-section {
    background:white; border-radius:24px; border:3px solid var(--dark);
    box-shadow:6px 6px 0 var(--dark); padding:30px; margin-bottom:40px;
  }
  .chart-wrap { position:relative; height:320px; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="badge">🏆 Intern Scoreboard</div>
    <div class="logo-wrap" id="wdliLogo">
      <img src="https://cdn.prod.website-files.com/6829ba317137e68337ab4113/6829e463f9165ea007955225_Weblikha-Logo.svg" alt="Weblikha Logo" class="logo-img">
    </div>
    <p class="subtitle">Score Cards · Weeks 1–3 · Scored out of 20</p>
  </header>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-icon">🎓</div><div class="stat-val">9</div><div class="stat-label">Interns</div></div>
    <div class="stat-box"><div class="stat-icon">📋</div><div class="stat-val">3</div><div class="stat-label">Assessments</div></div>
    <div class="stat-box"><div class="stat-icon">⭐</div><div class="stat-val">20</div><div class="stat-label">Max Score</div></div>
    <div class="stat-box"><div class="stat-icon">🖌️</div><div class="stat-val">Kel</div><div class="stat-label">Design Judge</div></div>
    <div class="stat-box"><div class="stat-icon">💻</div><div class="stat-val">Matt</div><div class="stat-label">Dev Judge</div></div>
  </div>

  <div class="leaderboard">
    <div class="section-title"><span class="pill" style="background:var(--yellow)"></span>🏆 Leaderboard</div>
    <div id="leaderboard"></div>
  </div>

  <div class="section-title" id="cardsTitle"><span class="pill" style="background:var(--pink)"></span>🃏 Score Cards</div>
  <div class="cards-grid" id="cards"></div>

  <div class="chart-section">
    <div class="section-title"><span class="pill" style="background:var(--blue)"></span>📊 Performance Chart</div>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  </div>

</div>
<script>
const SHEET_ID = '1CviaWn7zd7qyeqyojnydAb5iMTRTXxIArAxSAGcjmUM';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const COLORS = ['#FF6B9D','#4D96FF','#6BCB77','#FFD93D','#C77DFF','#FF9A3C','#FF6B9D','#4D96FF','#6BCB77'];
const WEEK_LABELS = ['Week 1 · Webflow 101','Week 2 · Improved Version','Week 3 · Folio Idea'];

function avg(s){ const v=s.filter(x=>x!==null); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):'—'; }
function total(s){ return s.filter(x=>x!==null).reduce((a,b)=>a+b,0); }
function dotClass(s){ if(s===null)return 'dot dot-empty'; if(s>=18)return'dot dot-10';if(s>=15)return'dot dot-9';if(s>=13)return'dot dot-8';if(s>=11)return'dot dot-7';return'dot dot-6'; }
function barColor(s){ if(s>=18)return'#6BCB77';if(s>=15)return'#4D96FF';if(s>=13)return'#FFD93D';if(s>=11)return'#FF9A3C';return'#FF6B9D'; }
function parseNum(v){ const n=parseFloat(v); return isNaN(n)?null:n; }

function parseCSV(text) {
  const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g,'')));
  // Expected header: Name, Kel (Wk1), Matt (Wk1), Kel (Wk2), Matt (Wk2), Kel (Wk3), Matt (Wk3)
  const interns = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[0]) continue;
    const name = row[0];
    const weeks = [
      (row[1]||row[2]) ? [parseNum(row[1]), parseNum(row[2])] : null,
      (row[3]||row[4]) ? [parseNum(row[3]), parseNum(row[4])] : null,
      (row[5]||row[6]) ? [parseNum(row[5]), parseNum(row[6])] : null,
    ];
    interns.push({ name, weeks });
  }
  interns.forEach(intern => {
    intern.scores = intern.weeks.map(w => (w && w[0]!==null && w[1]!==null) ? w[0]+w[1] : null);
  });
  return interns;
}

function buildDashboard(interns) {
  // Update stats dynamically
  const allScores = interns.flatMap(i => i.scores.filter(s=>s!==null));
  const topIntern = [...interns].sort((a,b)=>total(b.scores)-total(a.scores))[0];
  const statsRow = document.querySelector('.stats-row');
  statsRow.innerHTML = `
    <div class="stat-box"><div class="stat-icon">🎓</div><div class="stat-val">${interns.length}</div><div class="stat-label">Interns</div></div>
    <div class="stat-box"><div class="stat-icon">📋</div><div class="stat-val">${interns[0]?.weeks.length||0}</div><div class="stat-label">Assessments</div></div>
    <div class="stat-box"><div class="stat-icon">⭐</div><div class="stat-val">20</div><div class="stat-label">Max Score</div></div>
    <div class="stat-box"><div class="stat-icon">🖌️</div><div class="stat-val">Kel</div><div class="stat-label">Design Judge</div></div>
    <div class="stat-box"><div class="stat-icon">💻</div><div class="stat-val">Matt</div><div class="stat-label">Dev Judge</div></div>
  `;

  // Build Leaderboard
  const sorted = [...interns].sort((a,b)=>total(b.scores)-total(a.scores));
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';
  sorted.forEach((intern,i)=>{
    const medals=['🥇','🥈','🥉'];
    const rankClass=['rank-1','rank-2','rank-3'][i]||'rank-other';
    const dots=intern.scores.map((s,wi)=>{
      const val=s!==null?s:'—';
      return `<div class="${dotClass(s)}" title="Week ${wi+1}: ${val}">${val}</div>`;
    }).join('');
    lb.innerHTML+=`
      <div class="lb-row">
        <div class="rank ${rankClass}">${medals[i]||'#'+(i+1)}</div>
        <div class="avatar" style="background:${COLORS[i]}">${intern.name[0]}</div>
        <div class="intern-name">${intern.name}</div>
        <div class="week-dots">${dots}</div>
        <div class="total-badge">${total(intern.scores)}</div>
      </div>`;
  });

  // Build Score Cards — sorted highest to lowest
  const cardsSorted = [...interns].sort((a,b)=>total(b.scores)-total(a.scores));
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  cardsSorted.forEach((intern,i)=>{
    const originalIndex = interns.indexOf(intern);
    const rows = intern.weeks.map((w, wi) => {
      const combined = w ? w[0]+w[1] : null;
      const tw = combined !== null ? (combined/20)*100 : 0;
      const color = combined !== null ? barColor(combined) : '#eee';
      const kelVal = w ? w[0] : null;
      const mattVal = w ? w[1] : null;
      return `<div class="score-row">
        <span class="score-label">Wk${wi+1}</span>
        <div class="score-bar-wrap"><div class="score-bar" data-w="${tw}" style="background:${color}"></div></div>
        <span class="score-val">${combined !== null ? combined : '<span style="color:#ccc">—</span>'}</span>
      </div>
      <div class="score-breakdown">
        <span class="judge-chip kel">🖌️ Kel: ${kelVal !== null ? kelVal : '—'}</span>
        <span class="judge-chip matt">💻 Matt: ${mattVal !== null ? mattVal : '—'}</span>
      </div>`;
    }).join('');
    cardsEl.innerHTML+=`
      <div class="card">
        <div class="card-avatar" style="background:${COLORS[originalIndex]}">${intern.name[0]}</div>
        <div class="card-name">${intern.name}</div>
        <div class="card-avg">Avg: <span>${avg(intern.scores)}</span> · Total: <span>${total(intern.scores)}</span></div>
        <div class="card-scores">${rows}</div>
      </div>`;
  });

  // Build Chart
  if (window._chart) window._chart.destroy();
  window._chart = new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'bar',
    data:{
      labels: WEEK_LABELS,
      datasets: interns.map((intern,i)=>({
        label: intern.name,
        data: intern.scores.map(s=>s),
        backgroundColor: COLORS[i]+'CC', borderColor: COLORS[i],
        borderWidth:2, borderRadius:8, borderSkipped:false,
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'bottom',labels:{font:{family:'Nunito',weight:'800',size:12},padding:16,usePointStyle:true}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw??'—'}`}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Nunito',weight:'800',size:11}}},
        y:{min:0,max:20,grid:{color:'#f0f0f0'},ticks:{font:{family:'Nunito',weight:'700'},stepSize:2}}
      }
    }
  });

  // GSAP animations
  gsap.set('.badge',         { y:-50, opacity:0 });
  gsap.set('#wdliLogo',      { y:-40, opacity:0, scale:0.8 });
  gsap.set('.subtitle',      { y:20,  opacity:0 });
  gsap.set('.stat-box',      { y:40,  opacity:0, scale:0.82 });
  gsap.set('.leaderboard',   { y:50,  opacity:0 });
  gsap.set('.lb-row',        { x:-40, opacity:0 });
  gsap.set('#cardsTitle',    { y:20,  opacity:0 });
  gsap.set('.card',          { y:40,  opacity:0, scale:0.9 });
  gsap.set('.chart-section', { y:40,  opacity:0 });

  const tl = gsap.timeline({ defaults:{ ease:'power3.out' }, delay:0.1 });
  tl.to('.badge',         { y:0, opacity:1, duration:0.6, ease:'back.out(1.5)' })
    .to('#wdliLogo',      { y:0, opacity:1, scale:1, duration:0.7, ease:'back.out(1.8)' }, '-=0.3')
    .to('.subtitle',      { y:0, opacity:1, duration:0.5 }, '-=0.3')
    .to('.stat-box',      { y:0, opacity:1, scale:1, duration:0.5, stagger:0.08, ease:'back.out(1.7)' }, '-=0.2')
    .to('.leaderboard',   { y:0, opacity:1, duration:0.55 }, '-=0.15')
    .to('.lb-row',        { x:0, opacity:1, duration:0.38, stagger:0.07, ease:'power2.out' }, '-=0.4')
    .to('#cardsTitle',    { y:0, opacity:1, duration:0.45 }, '-=0.1')
    .to('.card',          { y:0, opacity:1, scale:1, duration:0.42, stagger:0.06, ease:'back.out(1.4)' }, '-=0.3')
    .to('.chart-section', { y:0, opacity:1, duration:0.55, ease:'power2.out' }, '-=0.2')
    .call(()=>{
      gsap.to('.score-bar',{
        width:(i,el)=>(el.dataset.w||0)+'%',
        duration:0.85, ease:'power2.out', stagger:0.025
      });
    }, null, '-=0.2');

  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mouseenter',()=>gsap.to(card,{y:-6,scale:1.03,boxShadow:'8px 8px 0 #1a1a2e',duration:0.2,ease:'power2.out'}));
    card.addEventListener('mouseleave',()=>gsap.to(card,{y:0,scale:1,boxShadow:'5px 5px 0 #1a1a2e',duration:0.25,ease:'power2.inOut'}));
  });
  document.querySelectorAll('.lb-row').forEach(row=>{
    row.addEventListener('mouseenter',()=>gsap.to(row,{x:10,duration:0.2,ease:'power2.out'}));
    row.addEventListener('mouseleave',()=>gsap.to(row,{x:0,duration:0.22,ease:'power2.inOut'}));
  });
  document.querySelectorAll('.stat-box').forEach(box=>{
    box.addEventListener('mouseenter',()=>gsap.to(box,{scale:1.07,y:-4,duration:0.2,ease:'back.out(2)'}));
    box.addEventListener('mouseleave',()=>gsap.to(box,{scale:1,y:0,duration:0.25,ease:'power2.inOut'}));
  });
}

// Show loading state
function showLoading() {
  document.getElementById('leaderboard').innerHTML = `<div style="text-align:center;padding:40px;color:#aaa;font-weight:800;font-size:16px;">⏳ Fetching latest scores...</div>`;
  document.getElementById('cards').innerHTML = '';
}

// Show error state
function showError(msg) {
  document.getElementById('leaderboard').innerHTML = `<div style="text-align:center;padding:40px;color:#FF6B9D;font-weight:800;font-size:15px;">⚠️ ${msg}</div>`;
}

// Fetch and render
async function fetchAndRender() {
  showLoading();
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Could not load sheet (status ' + res.status + ')');
    const text = await res.text();
    const interns = parseCSV(text);
    if (!interns.length) throw new Error('No intern data found in sheet.');
    buildDashboard(interns);
  } catch(e) {
    showError('Could not fetch sheet data. Make sure the sheet is set to "Anyone with the link can view". Error: ' + e.message);
    console.error(e);
  }
}

fetchAndRender();
</script>
</body>
</html>
